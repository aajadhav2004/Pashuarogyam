<!-- Consultant Navbar - Include this in all consultant-related pages -->
<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-left">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/logo.svg') }}" alt="PashuArogyam Logo"
                    style="height: 45px; width: auto;">
            </div>
            <ul class="nav-links">
                <li><a href="/consultant/dashboard">Dashboard</a></li>
                <li><a href="#consultations">Consultations</a></li>
                <li><a href="#profile">Profile</a></li>
            </ul>
        </div>
        <div class="navbar-right">
            <div class="user-info" onclick="toggleUserDropdown()">
                <div class="user-avatar">👨‍⚕️</div>
                <div class="user-name">Dr. {{ session.name or 'Consultant' }}</div>
                <div class="user-dropdown" id="userDropdown">
                    <a href="#profile" class="dropdown-item">👤 My Profile</a>
                    <a href="#" class="dropdown-item">⚙️ Settings</a>
                    <a href="#" class="dropdown-item">📊 My Reports</a>
                    <div class="dropdown-divider"></div>
                    <a href="#" class="dropdown-item" onclick="logout(); return false;">🚪 Logout</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<script>
    // Toggle user dropdown
    function toggleUserDropdown() {
        const dropdown = document.getElementById('userDropdown');
        dropdown.classList.toggle('show');
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', function (event) {
        const userInfo = document.querySelector('.user-info');
        const dropdown = document.getElementById('userDropdown');

        if (dropdown && !userInfo.contains(event.target)) {
            dropdown.classList.remove('show');
        }
    });

    // Logout function
    async function logout() {
        try {
            await fetch('/api/consultant/logout', { method: 'POST' });
            window.location.href = '/consultant-login';
        } catch (error) {
            console.error('Error logging out:', error);
            window.location.href = '/consultant-login';
        }
    }
</script>
