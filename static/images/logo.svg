    <rect x="-12" y="-2" width="24" height="4" fill="#2E8B57" rx="2"/>
    
    <!-- Heart symbol -->
    <path d="M -6,-8 Q -8,-10 -10,-8 Q -12,-6 -10,-4 L 0,4 L 10,-4 Q 12,-6 10,-8 Q 8,-10 6,-8 Q 4,-6 0,-4 Q -4,-6 -6,-8 Z" 
